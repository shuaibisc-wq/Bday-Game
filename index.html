<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prova Run: 18th Birthday Dash 🏃‍♀️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #1e1b4b; font-family: sans-serif; height: 100vh; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #312e81, #1e1b4b); overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #ui { 
            position: absolute; top: 20px; width: 100%; display: flex; 
            justify-content: space-around; color: #f472b6; font-weight: bold; 
            z-index: 10; font-size: 1.5rem; pointer-events: none; text-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
        }

        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.9); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center; color: white;
        }
        button { padding: 15px 50px; background: #f43f5e; color: white; border: none; border-radius: 50px; font-size: 1.3rem; font-weight: bold; box-shadow: 0 0 20px rgba(244, 63, 94, 0.6); }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <span>Score: <span id="score">0</span></span>
        </div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="overlay">
            <h1 style="font-family: 'Pacifico'; color: #f43f5e; font-size: 3rem;">Prova Run</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">Swipe Left/Right to Catch Shuaib!</p>
            <button onclick="startGame()">Start Dash ✨</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const provaImg = new Image(); provaImg.src = '1000017694-removebg-preview.png'; 
    const shuaibImg = new Image(); shuaibImg.src = 'a97cf831-5384-4688-ac64-a6430ba0cc45-1_all_7690-removebg-preview.png';
    const kittyImg = new Image(); kittyImg.src = 'kitty.jpg';
    const iceCreamImg = new Image(); iceCreamImg.src = 'discone.jpg';

    let gameActive = false, score = 0, gameSpeed = 5, twinkle = 0;
    const charSize = 70;
    let currentLane = 1; // 0: Left, 1: Middle, 2: Right
    let laneWidth;
    
    let items = []; // Obstacles and Shuaib

    // SWIPE CONTROLS
    let sX;
    window.addEventListener('touchstart', e => sX = e.touches[0].clientX);
    window.addEventListener('touchend', e => {
        if(!gameActive) return;
        const dX = e.changedTouches[0].clientX - sX;
        if (Math.abs(dX) > 30) {
            if (dX > 0 && currentLane < 2) currentLane++;
            else if (dX < 0 && currentLane > 0) currentLane--;
        }
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        laneWidth = canvas.width / 3;
    }
    window.addEventListener('resize', resize);

    function startGame() {
        resize();
        document.getElementById('overlay').style.display = 'none';
        gameActive = true; score = 0; gameSpeed = 6; items = []; currentLane = 1;
        spawnItem();
        requestAnimationFrame(gameLoop);
    }

    function spawnItem() {
        if(!gameActive) return;
        const lane = Math.floor(Math.random() * 3);
        const isShuaib = Math.random() > 0.75;
        items.push({
            lane: lane,
            y: -100,
            type: isShuaib ? 'shuaib' : 'wall',
            color: isShuaib ? '#60a5fa' : '#f43f5e'
        });
        setTimeout(spawnItem, Math.max(600, 1500 - (score * 2)));
    }

    function drawCircle(img, x, y, border) {
        ctx.save();
        ctx.beginPath(); ctx.arc(x + charSize/2, y + charSize/2, charSize/2, 0, Math.PI*2); ctx.clip();
        if(img.complete) ctx.drawImage(img, x, y, charSize, charSize);
        ctx.restore();
        ctx.strokeStyle = border; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(x + charSize/2, y + charSize/2, charSize/2, 0, Math.PI*2); ctx.stroke();
    }

    function gameLoop() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Lanes (Road)
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.setLineDash([20, 20]);
        for(let i = 1; i < 3; i++) {
            ctx.beginPath(); ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height); ctx.stroke();
        }
        ctx.setLineDash([]);

        // Update & Draw Items
        items.forEach((item, index) => {
            item.y += gameSpeed;
            const itemX = item.lane * laneWidth + (laneWidth/2 - charSize/2);
            
            if (item.type === 'shuaib') {
                drawCircle(shuaibImg, itemX, item.y, "#60a5fa");
            } else {
                // Draw Wall/Obstacle
                ctx.fillStyle = "#f43f5e";
                ctx.beginPath(); ctx.roundRect(itemX, item.y, charSize, charSize, 10); ctx.fill();
                drawCircle(kittyImg, itemX, item.y, "red");
            }

            // Collision Check
            const provaX = currentLane * laneWidth + (laneWidth/2 - charSize/2);
            const provaY = canvas.height - 150;

            if (item.y + charSize > provaY && item.y < provaY + charSize && item.lane === currentLane) {
                if (item.type === 'shuaib') {
                    score += 10;
                    document.getElementById('score').innerText = score;
                    twinkle = 20;
                    items.splice(index, 1);
                    gameSpeed += 0.1; // Get faster
                } else {
                    gameActive = false;
                    location.reload(); // Hit wall = Game Over
                }
            }

            if (item.y > canvas.height) items.splice(index, 1);
        });

        // Draw Prova
        const provaX = currentLane * laneWidth + (laneWidth/2 - charSize/2);
        drawCircle(provaImg, provaX, canvas.height - 150, "#f472b6");

        // Ice Cream Twinkle
        if (twinkle > 0) {
            ctx.drawImage(iceCreamImg, canvas.width/2 - 50, 100, 100, 100);
            twinkle--;
        }

        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
